# Must match the Worker connected to Workers Builds / the GitHub integration
# in the Cloudflare dashboard exactly (currently "kvarn-coffee", serving
# kvarn.helgemorgenstern.de) — never override with `--name` on the CLI
# (`wrangler deploy`, `wrangler secret put`, ...), that creates a second,
# disconnected Worker instead of targeting this one.
name = "kvarn-coffee"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
# Served via the custom domain kvarn.helgemorgenstern.de (attached through the
# Cloudflare dashboard's Domains tab, not tracked here in wrangler.toml).
# Without this, Wrangler defaults to assuming a workers.dev deployment and
# fails deploys until a workers.dev subdomain is registered on the account —
# which we don't need since the custom domain already routes to this Worker.
workers_dev = false

[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# --- D1 (SQLite) ---
# Create once you have a Cloudflare account: `pnpm wrangler login`, then
#   pnpm wrangler d1 create kvarn
# and paste the returned database_id below (Location Hint: weur — Western Europe).
[[d1_databases]]
binding = "DB"
database_name = "kvarn"
database_id = "f5238eee-e796-4297-a972-dead2e6fc299"
migrations_dir = "../../packages/db/migrations"

# --- R2 (bean photos, user equipment photos) ---
#   pnpm wrangler r2 bucket create kvarn-photos
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "kvarn-photos"

# --- KV (weather snapshot cache) ---
#   pnpm wrangler kv namespace create WEATHER_CACHE
[[kv_namespaces]]
binding = "WEATHER_CACHE"
id = "1cf546db2d774167b8d9788ca915afa1"

[observability]
enabled = true
